[package]
name = "build-fixture"
version = "0.3.0"

[ignis]
std = true
std_path = "./std"
runtime_path = "./std/runtime"

[aliases]
"@compiler" = "./ignis"

[build]
bin = false
source_dir = "src"
entry = "main.ign"
out_dir = "build/out"
opt_level = 2
debug = true
target = "iir"
target_triple = "x86_64-unknown-linux-gnu"
cc = "clang"
cflags = ["-Wall", "-Winvalid"]
emit = ["c", "obj"]
